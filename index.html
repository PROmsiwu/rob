<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>مساعد الذكاء الاصطناعي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --text-muted: #7878a0;
      --radius: 18px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px rgba(108,99,255,0.4);
    }
    .header-info h1 { font-size: 16px; font-weight: 700; }
    .header-info p { font-size: 12px; color: var(--text-muted); }
    .status-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #22c55e; margin-left: 5px;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .message {
      display: flex; flex-direction: column;
      max-width: 85%;
      animation: slide-in 0.3s ease;
    }
    @keyframes slide-in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .message.user { align-self: flex-start; }
    .message.ai { align-self: flex-end; }
    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.65;
      word-break: break-word;
    }
    .message.user .bubble {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.ai .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 5px; padding: 0 4px; }
    .message.user .msg-time { text-align: right; }
    .message.ai .msg-time { text-align: left; }
    .typing-indicator { display: none; align-self: flex-end; }
    .typing-indicator.show { display: flex; }
    .typing-bubble {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); border-bottom-left-radius: 4px;
      padding: 14px 20px; display: flex; gap: 6px; align-items: center;
    }
    .typing-bubble span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2){animation-delay:.2s}
    .typing-bubble span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)}}
    .welcome { text-align: center; margin: auto; padding: 30px 20px; }
    .welcome-icon { font-size: 52px; margin-bottom: 16px; display: block; filter: drop-shadow(0 0 20px rgba(108,99,255,0.5)); }
    .welcome h2 {
      font-size: 22px; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome p { color: var(--text-muted); font-size: 14px; }
    .quick-prompts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .quick-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px; border-radius: 99px;
      font-family: 'Tajawal', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .quick-btn:hover, .quick-btn:active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.1); }
    .input-area {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }
    textarea {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: 'Tajawal', sans-serif; font-size: 15px;
      padding: 11px 14px; resize: none; outline: none;
      max-height: 120px; min-height: 46px; line-height: 1.5; transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: var(--accent); }
    .send-btn {
      width: 46px; height: 46px; border-radius: var(--radius-sm);
      border: none; background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, opacity 0.15s;
      box-shadow: 0 4px 16px rgba(108,99,255,0.4);
    }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .toast {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: #ef4444; color: #fff; padding: 10px 20px;
      border-radius: 99px; font-size: 13px; z-index: 999;
      display: none; white-space: nowrap;
    }
    .toast.show { display: block; animation: slide-in 0.3s ease; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <h1>مساعد ذكي <span class="status-dot"></span></h1>
      <p>Claude · متصل الآن</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <span class="welcome-icon">✨</span>
      <h2>أهلاً بك!</h2>
      <p>اسألني أي شيء وسأساعدك على الفور</p>
      <div class="quick-prompts">
        <button class="quick-btn" onclick="sendQuick('اشرح لي الذكاء الاصطناعي ببساطة')">🧠 الذكاء الاصطناعي</button>
        <button class="quick-btn" onclick="sendQuick('اكتب لي كود Python بسيط')">💻 كود Python</button>
        <button class="quick-btn" onclick="sendQuick('ساعدني في تعلم البرمجة')">📚 البرمجة</button>
        <button class="quick-btn" onclick="sendQuick('اقترح لي أفكار لمشروع تقني')">🚀 أفكار</button>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-bubble"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMHxHqIrZIWfaSaXvFoNCwFUjQF-gK6qM",
      authDomain: "project-fe025bb5-b1cc-4b8f-93e.firebaseapp.com",
      databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com",
      projectId: "project-fe025bb5-b1cc-4b8f-93e",
      storageBucket: "project-fe025bb5-b1cc-4b8f-93e.firebasestorage.app",
      messagingSenderId: "148069353954",
      appId: "1:148069353954:web:c983e6c4896bed1493d1bb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const conversationHistory = [];

    window.sendMessage = async function() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      hideWelcome();
      addMessage(text, 'user');
      input.value = '';
      autoResize(input);
      setLoading(true);
      conversationHistory.push({ role: 'user', content: text });
      push(ref(db, 'messages'), { role: 'user', content: text, timestamp: serverTimestamp() });
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });
        if (!res.ok) throw new Error(`${res.status}`);
        const data = await res.json();
        const reply = data.reply || 'حدث خطأ';
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage(reply, 'ai');
        push(ref(db, 'messages'), { role: 'assistant', content: reply, timestamp: serverTimestamp() });
      } catch (err) {
        showToast('⚠️ خطأ في الاتصال — تأكد من نشر api/chat.js');
        console.error(err);
      } finally {
        setLoading(false);
      }
    };

    window.sendQuick = function(text) {
      document.getElementById('userInput').value = text;
      sendMessage();
    };

    function addMessage(text, role) {
      const area = document.getElementById('chatArea');
      const typing = document.getElementById('typingIndicator');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const now = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `<div class="bubble">${escHtml(text)}</div><div class="msg-time">${now}</div>`;
      area.insertBefore(div, typing);
      area.scrollTop = area.scrollHeight;
    }
    function escHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }
    function hideWelcome() { const w = document.getElementById('welcome'); if(w) w.remove(); }
    function setLoading(on) {
      document.getElementById('typingIndicator').classList.toggle('show', on);
      document.getElementById('sendBtn').disabled = on;
      document.getElementById('chatArea').scrollTop = 99999;
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 4000);
    }
  </script>
  <script>
    function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
    function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
  </script>
</body>
</html>
